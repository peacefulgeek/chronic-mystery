services:
  - type: web
    name: chronic-mystery
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm build && node scripts/generate-sitemap.mjs
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
    headers:
      - path: /*
        name: X-Robots-Tag
        value: noai, noimageai
      - path: /images/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
